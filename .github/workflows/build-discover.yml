name: Build discover.json

# Weekly refresh of the Discover feed. Comics ship on Wednesdays (US), so we run mid-day Wednesday
# UTC. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 14 * * 3" # Wednesdays 14:00 UTC
  workflow_dispatch:

# Allow the job to commit the regenerated discover.json back to the repo.
permissions:
  contents: write

# Never let two refreshes run at once.
concurrency:
  group: build-discover
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Metron/API responses
        # The on-disk cache is keyed by call signature, so a persistent cache cuts API calls and
        # respects rate limits without going stale (a new week's store_date window is a new key).
        uses: actions/cache@v4
        with:
          path: .cache
          key: api-cache-${{ github.run_id }}
          restore-keys: |
            api-cache-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build discover.json
        # Testing phase: personal tier includes the CBR curation shelves (and CBR ratings / AIPT
        # verdicts via the config toggles). Switch to `distribution` for a clean public ship once
        # CBR/AIPT permissions are secured.
        env:
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: python -m riso_discover.build --build-tier personal -v

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add discover.json
          if git diff --staged --quiet; then
            echo "discover.json unchanged — nothing to commit."
          else
            git commit -m "chore: weekly discover.json refresh ($(date -u +%Y-%m-%d))"
            git push
          fi

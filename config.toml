# riso-discover-feed configuration.
#
# build_tier controls which sources are allowed to run:
#   "distribution" -> only distribution-clean sources (safe for an App Store build)
#   "personal"     -> also runs personal-only sources (CBR, ComicVine) for local/testing
# A source whose tier is "personal" is skipped automatically when build_tier is "distribution".
build_tier = "distribution"

# Each source is an independent, flag-gated module. tier is "distribution" or "personal".
[sources.metron]
enabled = true
tier = "distribution"

# Future sources (scaffolded later in the build sequence) — disabled for now.
[sources.wikidata]
enabled = true
tier = "distribution"

[sources.rss]
enabled = true
tier = "distribution"
# Testing: pull AIPT's score + verdict + likes/dislikes (teaser) with a prominent Read-more link.
# Set false for a clean ship (feed excerpt + link only). Permission from AIPT pending.
include_verdict = true

[sources.classics]
enabled = true
tier = "distribution"

[sources.cbr]
enabled = true
tier = "personal"
# Testing: show CBR's aggregate critic score + review count, crediting CBR on the direct lists.
# Set false for the conservative "RISO pick, no scores" mode. Permission from CBR pending.
show_rating = true

[sources.comicvine]
enabled = false
tier = "personal"
